## Use ctrl+o for commands
unbind C-b
set -g prefix C-o

## bind keys
bind-key C-b send-prefix
bind-key C-o last-window
bind-key A command-prompt -I "#W" "rename-window '%%'"
bind-key k kill-window
bind-key | split-window -h
bind-key - split-window -v
bind-key r source-file ~/.tmux.conf
bind-key C-a setw synchronize-panes

## color
set -g default-terminal "alacritty"
set-option -ga terminal-overrides ",alacritty:Tc"

## History / Copy
set -g history-limit 100000
set -g mouse on
set-option -s set-clipboard on

# General options
set-option -g allow-rename off
set-option -g automatic-rename off

set -g status-right-length 75
set -g status-right "#(/home/jmarsh/bin/tmux-status)"

# copy to system clipboard
bind-key -T copy-mode r send -X rectangle-toggle
bind-key -T copy-mode MouseDragEnd1Pane send -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode M-w send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key C-y run "wl-paste | tmux load-buffer - ; tmux paste-buffer"
